<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Awesome Selfhosted - A curated list of awesome self-hosted software</title>
    <meta name="description" content="A curated list of awesome self-hosted software. Run your own services and take control of your data.">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚀</text></svg>">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <div class="logo-icon">🚀</div>
                    <div class="logo-text">Awesome <span>Selfhosted</span></div>
                </div>
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="search-input" placeholder="Search software..." autocomplete="off">
                </div>
            </div>
            <nav class="sidebar-nav" id="sidebar-nav">
                <!-- Navigation rendered by JS -->
            </nav>
        </aside>

        <!-- Overlay for mobile -->
        <div class="overlay"></div>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-header">
                <button class="menu-toggle" aria-label="Toggle menu">
                    <i class="fas fa-bars"></i>
                </button>
                <div class="breadcrumb">
                    <a href="#" onclick="filterCategory('all'); return false;">Home</a>
                    <span id="breadcrumb-current"></span>
                </div>
                <div class="header-actions">
                    <button class="theme-toggle" aria-label="Toggle theme">
                        <i class="fas fa-moon"></i>
                    </button>
                    <a href="https://github.com/awesome-selfhosted/awesome-selfhosted" target="_blank" rel="noopener" class="github-link">
                        <i class="fab fa-github"></i>
                        <span>GitHub</span>
                    </a>
                </div>
            </header>

            <div class="content" id="content-area">
                <!-- Content rendered by JS -->
            </div>
        </main>
    </div>

    <!-- Scroll to top button -->
    <button class="scroll-top" aria-label="Scroll to top">
        <i class="fas fa-arrow-up"></i>
    </button>

    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
